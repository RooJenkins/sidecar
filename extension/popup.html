<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      padding: 16px;
      background: #fafafa;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.connected { background: #16a34a; }
    .status-dot.disconnected { background: #dc2626; }
    .status-dot.checking { background: #ca8a04; }
    .status-text { color: #555; }
    .version { color: #888; font-size: 12px; margin-bottom: 12px; }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .setting-row label { color: #555; }
    .setting-row input[type="range"] { width: 100px; }
    .setting-row .value { width: 20px; text-align: right; color: #333; font-weight: 500; }
    .hotkey {
      margin-top: 12px;
      padding: 8px;
      background: #f0f0f0;
      border-radius: 6px;
      text-align: center;
      font-size: 12px;
      color: #666;
    }
    kbd {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 3px;
      padding: 1px 5px;
      font-family: inherit;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <h1>Sidecar</h1>

  <div class="status-row">
    <div id="status-dot" class="status-dot checking"></div>
    <span id="status-text" class="status-text">Checking...</span>
  </div>
  <div id="version" class="version"></div>

  <div class="setting-row">
    <label>Max results</label>
    <input type="range" id="max-results" min="1" max="10" value="5">
    <span id="max-results-value" class="value">5</span>
  </div>

  <div class="hotkey">
    <kbd>⌘</kbd> + <kbd>J</kbd> to inject context
  </div>

  <script src="popup.js"></script>
</body>
</html>
